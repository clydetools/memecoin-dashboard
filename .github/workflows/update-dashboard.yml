name: Update memecoin dashboard

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python generate_public_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html index.html memecoin_accuracy_log.jsonl seen_coin_names.json holder_history.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (likely a concurrent run) — retrying with latest remote, attempt $i"
            git fetch origin main
            git merge -X ours origin/main --no-edit
          done
          echo "Failed to push after retries"
          exit 1
